mode: rule
log-level: info       

dns:
  nameserver: [223.5.5.5, 119.29.29.29]
  fake-ip-filter: ['+.lan', '*', '+.local', '+.cmpassport.com', 'id6.me', 'open.e.189.cn', 'mdn.open.wo.cn', 'opencloud.wostore.cn', 'auth.wosms.cn', '+.10099.com.cn', '+.msftconnecttest.com', '+.msftncsi.com', 'lancache.steamcontent.com']

subscribe-url: 

proxy-providers:
  Subscribe:
    interval: 86400
    url: http://your-service-provider
    benchmark-timeout: 5
    benchmark-url: http://1.1.1.1/generate_204

proxy-groups:
  - {name: Proxy, type: select, include-all: true, icon: https://github.com/shindgewongxj/WHATSINStash/raw/main/icon/applesafari.png}

rules:

  - GEOSITE,openai,Proxy
  - GEOSITE,category-games,Proxy
  - GEOSITE,github,Proxy
  - GEOSITE,telegram,Proxy
  - GEOSITE,twitter,Proxy
  - GEOSITE,microsoft,Proxy
  - GEOSITE,youtube,Proxy
  - GEOSITE,google,Proxy
  - GEOSITE,geolocation-!cn,Proxy
  - GEOSITE,private,DIRECT
  - GEOIP,telegram,Proxy
  - GEOIP,twitter,Proxy
  - GEOIP,google,Proxy
  - GEOIP,private,DIRECT
  - GEOIP,cn,DIRECT

  - MATCH,Proxy


