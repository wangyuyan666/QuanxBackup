Singapore = NameRegex, FilterKey = "(?i)🇸🇬|新加坡|狮|(\b(SG|Singapore)\b)"
Japan = NameRegex, FilterKey = "(?i)🇯🇵|日本|东京|(\b(JP|Japan)\b)"
Taiwan = NameRegex, FilterKey = "(?i)🇨🇳|🇹🇼|台湾|(\b(TW|Tai|Taiwan)\b)"

