<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Repository Search</title>
<meta name="description" content="Proxy Tool 仓库文件搜索 - sing-box / mihomo / Surge / Quantumult X / Loon / Shadowrocket / Stash / Egern / Surfboard 规则与配置文件搜索引擎">
<style>
  /* === Reset & Base === */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-input: #0d1117;
    --border: #30363d;
    --border-focus: #58a6ff;
    --text: #c9d1d9;
    --text-secondary: #8b949e;
    --text-muted: #484f58;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --radius: 8px;
    --radius-sm: 4px;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
  }
  html { font-size: 14px; scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); text-decoration: underline; }

  /* === Layout === */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

  /* === Header === */
  header {
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
    padding: 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.2rem;
    font-weight: 600;
  }
  .logo svg { width: 28px; height: 28px; }
  .header-stats {
    font-size: 0.85rem;
    color: var(--text-secondary);
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .header-stats span { white-space: nowrap; }
  .badge {
    display: inline-block;
    background: rgba(88,166,255,0.15);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: 500;
  }
  .update-time { color: var(--text-muted); font-size: 0.8rem; }

  /* === Search Controls === */
  .search-section {
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
  }
  .search-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 240px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 10px 14px 10px 40px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--border-focus); }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-box .icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }
  .filter-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-group select {
    padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
    min-width: 100px;
    transition: border-color 0.2s;
  }
  .filter-group select:focus { border-color: var(--border-focus); }
  .filter-group select option { background: var(--bg-card); }

  /* === Result Meta === */
  .result-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    font-size: 0.85rem;
    color: var(--text-secondary);
    flex-wrap: wrap;
    gap: 8px;
  }
  .result-count strong { color: var(--text); }

  /* === File List === */
  .file-list { padding: 4px 0 40px; }
  .file-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    background: var(--bg-card);
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
  }
  .file-item:hover {
    border-color: var(--accent);
    background: rgba(88,166,255,0.04);
  }
  .file-icon {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    font-family: var(--mono);
  }
  .file-icon.icon-json { background: rgba(88,166,255,0.15); color: #58a6ff; }
  .file-icon.icon-srs { background: rgba(188,140,255,0.15); color: #bc8cff; }
  .file-icon.icon-list { background: rgba(63,185,80,0.15); color: #3fb950; }
  .file-icon.icon-yaml { background: rgba(210,153,34,0.15); color: #d29922; }
  .file-icon.icon-js { background: rgba(241,224,90,0.15); color: #f1e05a; }
  .file-icon.icon-conf { background: rgba(248,81,73,0.15); color: #f85149; }
  .file-icon.icon-md { background: rgba(88,166,255,0.1); color: var(--text-secondary); }
  .file-icon.icon-mmdb { background: rgba(188,140,255,0.1); color: #bc8cff; }
  .file-icon.icon-module { background: rgba(210,153,34,0.15); color: #d29922; }
  .file-icon.icon-other { background: rgba(139,148,158,0.1); color: var(--text-secondary); }

  .file-info { flex: 1; min-width: 0; }
  .file-path {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--accent);
    word-break: break-all;
    display: block;
    line-height: 1.4;
  }
  .file-name {
    font-weight: 600;
    color: var(--text);
  }
  .file-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 3px;
    font-size: 0.78rem;
    color: var(--text-secondary);
  }
  .file-meta .tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 0.75rem;
  }
  .tag-platform {
    background: rgba(88,166,255,0.1);
    color: var(--accent);
  }
  .tag-category {
    background: rgba(63,185,80,0.1);
    color: var(--green);
  }
  .tag-lines {
    color: var(--text-muted);
  }
  .tag-size {
    color: var(--text-muted);
  }

  .file-actions {
    flex-shrink: 0;
    display: flex;
    gap: 6px;
  }
  .file-actions button {
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-secondary);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .file-actions button:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(88,166,255,0.08);
  }
  .file-actions button.copied {
    border-color: var(--green);
    color: var(--green);
  }

  /* === Empty State === */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state h3 { font-size: 1.1rem; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
  .empty-state p { font-size: 0.9rem; }

  /* === Active Filters Bar === */
  .active-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 8px 0 4px;
  }
  .active-filter {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    background: rgba(88,166,255,0.1);
    border: 1px solid rgba(88,166,255,0.2);
    border-radius: 12px;
    font-size: 0.78rem;
    color: var(--accent);
  }
  .active-filter .remove {
    cursor: pointer;
    opacity: 0.6;
    font-size: 1rem;
    line-height: 1;
  }
  .active-filter .remove:hover { opacity: 1; }

  /* === Scrollbar === */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* === Loading === */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 60px 0;
    color: var(--text-muted);
  }
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === Responsive === */
  @media (max-width: 768px) {
    header .container { flex-direction: column; align-items: flex-start; }
    .search-row { flex-direction: column; }
    .search-box { min-width: 100%; }
    .filter-group { width: 100%; }
    .filter-group select { flex: 1; min-width: 0; }
    .file-item { flex-wrap: wrap; }
    .file-actions { width: 100%; justify-content: flex-end; }
  }
</style>
</head>
<body>

<!-- ==================== HEADER ==================== -->
<header>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
        <path d="M8 11h6"/>
        <path d="M11 8v6"/>
      </svg>
      <span>Tool Repository Search</span>
      <span class="badge" id="fileCountBadge">-</span>
    </div>
    <div class="header-stats">
      <span id="platformCount">-</span>
      <span id="updateTime" class="update-time">-</span>
    </div>
  </div>
</header>

<!-- ==================== SEARCH ==================== -->
<section class="search-section">
  <div class="container">
    <div class="search-row">
      <div class="search-box">
        <span class="icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        <input type="text" id="searchInput" placeholder="搜索文件名、路径、平台... (e.g. Netflix, Apple, Reject)" autofocus>
      </div>
      <div class="filter-group">
        <select id="platformFilter">
          <option value="">All Platforms</option>
        </select>
        <select id="categoryFilter">
          <option value="">All Categories</option>
        </select>
        <select id="extFilter">
          <option value="">All Types</option>
          <option value=".list">.list</option>
          <option value=".json">.json</option>
          <option value=".srs">.srs</option>
          <option value=".yaml">.yaml</option>
          <option value=".js">.js</option>
          <option value=".conf">.conf</option>
          <option value=".sgmodule">.sgmodule</option>
          <option value=".mmdb">.mmdb</option>
          <option value=".md">.md</option>
          <option value=".stoverride">.stoverride</option>
        </select>
      </div>
    </div>
    <div class="active-filters" id="activeFilters"></div>
  </div>
</section>

<!-- ==================== RESULTS ==================== -->
<section class="container">
  <div class="result-meta">
    <div class="result-count">
      找到 <strong id="resultCount">0</strong> 个文件
      <span id="resultFiltered" style="display:none;color:var(--text-muted);">
        （已过滤，共 <span id="totalCount">0</span> 个）
      </span>
    </div>
    <div>
      <select id="sortSelect" style="padding:4px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:0.8rem;outline:none;cursor:pointer;">
        <option value="path">名称 A-Z</option>
        <option value="path_desc">名称 Z-A</option>
        <option value="size">大小 ↑</option>
        <option value="size_desc">大小 ↓</option>
        <option value="lines">行数 ↑</option>
        <option value="lines_desc">行数 ↓</option>
      </select>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>加载索引中...</span>
  </div>

  <!-- File List -->
  <div class="file-list" id="fileList"></div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6"/>
    </svg>
    <h3>未找到匹配文件</h3>
    <p>尝试修改搜索关键词或筛选条件</p>
  </div>
</section>

<!-- ==================== SCRIPT ==================== -->
<script>
'use strict';

const REPO = 'Repcz/Tool';
const BRANCH = 'X';
const RAW_BASE = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;
const GITHUB_BASE = `https://github.com/${REPO}/blob/${BRANCH}`;

let allFiles = [];
let indexData = null;
let debounceTimer = null;

// === DOM refs ===
const $ = id => document.getElementById(id);
const searchInput = $('searchInput');
const platformFilter = $('platformFilter');
const categoryFilter = $('categoryFilter');
const extFilter = $('extFilter');
const sortSelect = $('sortSelect');
const fileList = $('fileList');
const emptyState = $('emptyState');
const loading = $('loading');
const resultCount = $('resultCount');
const totalCount = $('totalCount');
const resultFiltered = $('resultFiltered');
const fileCountBadge = $('fileCountBadge');
const platformCount = $('platformCount');
const updateTime = $('updateTime');
const activeFilters = $('activeFilters');

// === Icon mapping ===
function getIconClass(ext) {
  const map = {
    '.json': 'icon-json',
    '.srs': 'icon-srs',
    '.list': 'icon-list',
    '.yaml': 'icon-yaml',
    '.yml': 'icon-yaml',
    '.js': 'icon-js',
    '.conf': 'icon-conf',
    '.sgmodule': 'icon-module',
    '.stoverride': 'icon-module',
    '.mmdb': 'icon-mmdb',
    '.md': 'icon-md',
    '.txt': 'icon-other',
  };
  return map[ext] || 'icon-other';
}

function getIconLabel(ext) {
  const map = {
    '.json': '{…}',
    '.srs': 'srs',
    '.list': 'L',
    '.yaml': 'Y',
    '.yml': 'Y',
    '.js': 'JS',
    '.conf': 'C',
    '.sgmodule': 'M',
    '.stoverride': 'O',
    '.mmdb': 'DB',
    '.md': 'MD',
    '.txt': 'T',
  };
  return map[ext] || '?';
}

function formatSize(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// === Highlight matching text ===
function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${escaped})`, 'gi');
  return escapeHtml(text).replace(re, '<mark style="background:rgba(88,166,255,0.25);color:var(--accent);padding:0 2px;border-radius:2px;">$1</mark>');
}

// === Render file item ===
function renderFile(file, query) {
  const div = document.createElement('div');
  div.className = 'file-item';

  const rawUrl = `${RAW_BASE}/${file.path}`;
  const githubUrl = `${GITHUB_BASE}/${file.path}`;

  div.innerHTML = `
    <div class="file-icon ${getIconClass(file.ext)}">${getIconLabel(file.ext)}</div>
    <div class="file-info">
      <span class="file-path">
        ${highlight(file.path, query)}
      </span>
      <div class="file-meta">
        <span class="tag tag-platform">${escapeHtml(file.platform)}</span>
        <span class="tag tag-category">${escapeHtml(file.category)}</span>
        ${file.lines ? `<span class="tag tag-lines">${file.lines} 行</span>` : ''}
        <span class="tag tag-size">${file.size_display}</span>
      </div>
    </div>
    <div class="file-actions">
      <button class="copy-raw" data-url="${rawUrl}" title="复制 Raw URL">Raw</button>
      <button class="open-github" data-url="${githubUrl}" title="在 GitHub 中打开">GitHub</button>
    </div>
  `;

  // Copy raw URL
  div.querySelector('.copy-raw').addEventListener('click', async function(e) {
    e.stopPropagation();
    try {
      await navigator.clipboard.writeText(this.dataset.url);
      this.textContent = '✓ Copied';
      this.classList.add('copied');
      setTimeout(() => { this.textContent = 'Raw'; this.classList.remove('copied'); }, 1500);
    } catch {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = this.dataset.url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      this.textContent = '✓ Copied';
      this.classList.add('copied');
      setTimeout(() => { this.textContent = 'Raw'; this.classList.remove('copied'); }, 1500);
    }
  });

  // Open GitHub
  div.querySelector('.open-github').addEventListener('click', function(e) {
    e.stopPropagation();
    window.open(this.dataset.url, '_blank');
  });

  // Click to open GitHub
  div.addEventListener('click', () => {
    window.open(githubUrl, '_blank');
  });

  return div;
}

// === Filter & Sort ===
function getFilteredFiles() {
  const query = searchInput.value.trim().toLowerCase();
  const platform = platformFilter.value;
  const category = categoryFilter.value;
  const ext = extFilter.value;

  return allFiles.filter(file => {
    // Text search
    if (query) {
      const searchTarget = `${file.path} ${file.platform} ${file.category} ${file.name}`.toLowerCase();
      // Support multi-term search (space separated, all terms must match)
      const terms = query.split(/\s+/).filter(Boolean);
      if (!terms.every(t => searchTarget.includes(t))) return false;
    }
    if (platform && file.platform !== platform) return false;
    if (category && file.category !== category) return false;
    if (ext && file.ext !== ext) return false;
    return true;
  });
}

function sortFiles(files, sortKey) {
  const sorted = [...files];
  switch (sortKey) {
    case 'path':
      sorted.sort((a, b) => a.path.localeCompare(b.path));
      break;
    case 'path_desc':
      sorted.sort((a, b) => b.path.localeCompare(a.path));
      break;
    case 'size':
      sorted.sort((a, b) => a.size - b.size);
      break;
    case 'size_desc':
      sorted.sort((a, b) => b.size - a.size);
      break;
    case 'lines':
      sorted.sort((a, b) => a.lines - b.lines);
      break;
    case 'lines_desc':
      sorted.sort((a, b) => b.lines - a.lines);
      break;
    default:
      sorted.sort((a, b) => a.path.localeCompare(b.path));
  }
  return sorted;
}

// === Render ===
function render() {
  const query = searchInput.value.trim();
  const filtered = getFilteredFiles();
  const sorted = sortFiles(filtered, sortSelect.value);

  fileList.innerHTML = '';
  const total = allFiles.length;

  if (sorted.length === 0) {
    emptyState.style.display = 'block';
    resultCount.textContent = '0';
    resultFiltered.style.display = total > 0 ? 'inline' : 'none';
    totalCount.textContent = total;
    return;
  }

  emptyState.style.display = 'none';

  if (sorted.length < total) {
    resultFiltered.style.display = 'inline';
    totalCount.textContent = total;
  } else {
    resultFiltered.style.display = 'none';
  }

  resultCount.textContent = sorted.length;

  // Batch render using DocumentFragment for performance
  const fragment = document.createDocumentFragment();
  for (const file of sorted) {
    fragment.appendChild(renderFile(file, query));
  }
  fileList.appendChild(fragment);

  // Update active filters
  renderActiveFilters();
}

function renderActiveFilters() {
  const filters = [];
  if (platformFilter.value) filters.push(`平台: ${platformFilter.value}`);
  if (categoryFilter.value) filters.push(`分类: ${categoryFilter.value}`);
  if (extFilter.value) filters.push(`类型: ${extFilter.value}`);

  activeFilters.innerHTML = filters.map(f =>
    `<span class="active-filter">${escapeHtml(f)}</span>`
  ).join('');
}

// === Debounced search ===
function onSearchChange() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 150);
}

// === Init filters ===
function initFilters(data) {
  // Platform
  data.platforms.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = `${p} (${data.platform_stats[p] || 0})`;
    platformFilter.appendChild(opt);
  });

  // Category
  data.categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = `${c} (${data.category_stats[c] || 0})`;
    categoryFilter.appendChild(opt);
  });
}

// === Init ===
async function init() {
  try {
    const resp = await fetch('search_index.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    indexData = await resp.json();
    allFiles = indexData.files;

    // Update header
    fileCountBadge.textContent = `${allFiles.length} files`;
    platformCount.textContent = `${indexData.platforms.length} platforms`;
    updateTime.textContent = `Updated: ${new Date(indexData.updated).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}`;

    // Init filter dropdowns
    initFilters(indexData);

    // Hide loading, show content
    loading.style.display = 'none';

    // Initial render
    render();
  } catch (err) {
    loading.innerHTML = `
      <div style="text-align:center;color:var(--red);">
        <p>❌ 索引加载失败</p>
        <p style="font-size:0.85rem;margin-top:4px;">${err.message}</p>
        <p style="font-size:0.8rem;margin-top:8px;color:var(--text-muted);">
          确保 <code style="background:var(--bg-card);padding:2px 6px;border-radius:3px;">search_index.json</code> 已生成
        </p>
      </div>
    `;
  }
}

// === Event listeners ===
searchInput.addEventListener('input', onSearchChange);
platformFilter.addEventListener('change', render);
categoryFilter.addEventListener('change', render);
extFilter.addEventListener('change', render);
sortSelect.addEventListener('change', render);

// Keyboard shortcut: focus search
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'k') {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    searchInput.blur();
  }
});

// === Start ===
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
